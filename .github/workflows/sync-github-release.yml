# Keep GitHub Releases aligned with successful CTAN publications without ever
# re-submitting to CTAN. This workflow consumes the validated bundle from a
# completed `Release CTAN` run and is safe to retry independently.
name: Sync GitHub Release

on:
  workflow_run:
    workflows:
      - Release CTAN
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "GitHub Actions run ID of a successful 'Release CTAN' workflow"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  # Serialize release-sync attempts for the same CTAN release run so automatic
  # and manual retries cannot race each other.
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || inputs.release_run_id }}
  cancel-in-progress: false

env:
  VALIDATED_ARTIFACT_NAME: validated-onlinebrief24-ctan-release-bundle

jobs:
  sync-github-release:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source release run
        id: source_run
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_run_id="${{ inputs.release_run_id }}"
          else
            release_run_id="${{ github.event.workflow_run.id }}"
          fi
          printf '%s\n' "release_run_id=$release_run_id" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          # Local workflow helper scripts do not exist on the runner until the
          # repository is checked out. A later checkout pins the exact CTAN
          # release commit once the validated bundle metadata has been read.
          fetch-depth: 1

      - name: Validate release run provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_RUN_ID_INPUT: ${{ steps.source_run.outputs.release_run_id }}
        run: |
          set -eu
          # Only a completed successful `Release CTAN` run from `main` may feed
          # the GitHub release sync. This preserves the same trust boundary as
          # the CTAN publish workflow itself.
          python3 scripts/lib/release_workflow.py validate-release-run-provenance \
            "${GITHUB_REPOSITORY}" \
            "${RELEASE_RUN_ID_INPUT}"

      - name: Download validated release bundle
        id: download_validated_bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Sync only from the post-validation bundle produced by `Release CTAN`
          # so GitHub never has to infer assets or metadata on its own.
          download_root="${RUNNER_TEMP}/release-sync-download"
          rm -rf "$download_root"
          mkdir -p "$download_root"
          gh run download "${{ steps.source_run.outputs.release_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${VALIDATED_ARTIFACT_NAME}" \
            --dir "$download_root"
          resolved_metadata_path=$(find "$download_root" -type f -name resolved-release-metadata.json -print | head -n 1)
          if [ -z "$resolved_metadata_path" ]; then
            printf '%s\n' "::error::Could not locate resolved-release-metadata.json in the validated release artifact."
            exit 1
          fi
          bundle_dir=$(dirname "$resolved_metadata_path")
          printf '%s\n' "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Read resolved release metadata
        id: metadata
        run: |
          set -eu
          # Read only the fields needed for checkout and final release tagging.
          python3 scripts/lib/release_workflow.py read-resolved-release-metadata \
            "${{ steps.download_validated_bundle.outputs.bundle_dir }}" \
            "${{ steps.source_run.outputs.release_run_id }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          # Sync the Git tag and GitHub Release against the exact commit that
          # CTAN just published from, not against the workflow file's branch tip.
          fetch-depth: 0
          ref: ${{ steps.metadata.outputs.source_commit_sha }}

      - name: Sync Git tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          sh scripts/sync-github-release.sh \
            "${{ steps.download_validated_bundle.outputs.bundle_dir }}" \
            "${{ steps.source_run.outputs.release_run_id }}"

      - name: Write GitHub release sync summary
        env:
          TRIGGER_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          python3 scripts/lib/release_workflow.py write-sync-github-release-summary \
            "${{ steps.download_validated_bundle.outputs.bundle_dir }}" \
            "${TRIGGER_EVENT_NAME}" \
            "${GITHUB_REPOSITORY}" >> "$GITHUB_STEP_SUMMARY"
