name: Verify

on:
  push:
  pull_request:

jobs:
  latex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            texlive-fonts-extra \
            texlive-lang-german \
            texlive-latex-extra \
            texlive-pictures \
            texlive-xetex

      - name: Verify examples
        run: sh scripts/verify.sh
